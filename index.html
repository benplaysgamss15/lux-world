<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦖 DinoWorld - Open World Survival Index</title>
<style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}
body { 
    background: #000; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    overflow: hidden; 
    font-family: 'Courier New', Courier, monospace; 
}
#gc { 
    display: block; 
    image-rendering: pixelated; 
    cursor: crosshair; 
    touch-action: none; 
}

/* Chat Scrollbar Styling */
.chat-msg {
    background: rgba(0,0,0,0.5); 
    padding: 6px 10px; 
    border-radius: 4px;
    font-family: 'Courier New', monospace; 
    font-size: 14px; 
    font-weight: bold;
    text-shadow: 1px 1px 0 #000; 
    word-wrap: break-word; 
    flex-shrink: 0;
    transition: transform 0.2s ease-out; /* NEW: Added for smooth swiping */
}
#chatMessages::-webkit-scrollbar { 
    width: 6px; 
}
#chatMessages::-webkit-scrollbar-thumb { 
    background: rgba(255,255,255,0.3); 
    border-radius: 3px; 
}
</style>
</head>
<body>

<!-- HTML CHAT HISTORY OVERLAY -->
<div id="chatContainer" style="position:absolute; top:20px; left:20px; width:320px; max-width:50%; height:250px; display:flex; flex-direction:column; justify-content:flex-end; pointer-events:none; z-index:50;">
    <div id="chatMessages" style="overflow-y:auto; max-height:100%; display:flex; flex-direction:column; gap:4px; padding-right:5px; transition:opacity 0.3s; opacity:0;"></div>
</div>

<!-- HTML CHAT INPUT OVERLAY -->
<div id="chatBox" style="display:none; position:absolute; top:20px; left:50%; transform:translateX(-50%); width:320px; max-width:90%; z-index:100; gap:5px;">
    <input type="text" id="chatInp" style="flex:1; padding:12px; border-radius:8px; border:2px solid #44aa44; background:#111; color:#fff; font-family:'Courier New',monospace; font-size:16px; outline:none;" placeholder="Type message..." maxlength="50">
    <button id="chatSend" style="padding:10px 15px; background:#44aa44; color:#fff; border:none; border-radius:8px; font-weight:bold; font-family:'Courier New',monospace; font-size:16px;">Send</button>
</div>

<!-- HTML MULTIPLAYER MODAL OVERLAY -->
<div id="mpModal" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:320px; max-width:90%; z-index:200; background:rgba(20,20,40,0.95); border:2px solid #8822cc; border-radius:12px; padding:20px; flex-direction:column; gap:10px; font-family:'Courier New',monospace; color:#fff; text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.8);">
    <h2 id="mpTitle" style="margin-bottom:10px; color:#dd88ff; text-shadow:0 0 8px #aa44ff;">Host Game</h2>
    <input type="text" id="mpUserInp" style="width:100%; padding:10px; border-radius:8px; border:2px solid #5522aa; background:#111; color:#fff; font-family:'Courier New',monospace; font-size:16px; outline:none; margin-bottom:10px;" placeholder="Temp Username" maxlength="12">
    <input type="number" id="mpRoomInp" style="display:none; width:100%; padding:10px; border-radius:8px; border:2px solid #cc2288; background:#111; color:#fff; font-family:'Courier New',monospace; font-size:16px; outline:none; margin-bottom:10px;" placeholder="Room ID (e.g. 1234)" maxlength="4">
    <div style="display:flex; justify-content:space-between; gap:10px;">
        <button id="mpBtnCancel" style="flex:1; padding:10px; background:#aa2222; color:#fff; border:none; border-radius:8px; font-weight:bold; font-family:'Courier New',monospace; font-size:16px; cursor:pointer;">Cancel</button>
        <button id="mpBtnConfirm" style="flex:1; padding:10px; background:#44aa44; color:#fff; border:none; border-radius:8px; font-weight:bold; font-family:'Courier New',monospace; font-size:16px; cursor:pointer;">Confirm</button>
    </div>
</div>

<!-- HTML CO-OP INFO MODAL -->
<div id="coopModal" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:360px; max-width:90%; z-index:250; background:rgba(15,35,25,0.95); border:2px solid #22ccaa; border-radius:12px; padding:20px; flex-direction:column; gap:12px; font-family:'Courier New',monospace; color:#fff; text-align:center; box-shadow:0 0 25px rgba(0,0,0,0.9);">
    <h2 style="color:#22ccaa; font-size: 18px; margin-bottom:0;">Make a friendship together!</h2>
    <p style="font-size: 14px; color:#aaa; margin-bottom:5px;">But how does it work?</p>
    <p style="font-size: 14px; color:#fff; line-height:1.4;">You and ur friend team up to beat the game! You will share buckets, index, and progression!</p>
    
    <div style="background:rgba(0,0,0,0.5); border:1px solid #44aa44; border-radius:8px; padding:10px; margin: 5px 0;">
        <p style="font-size: 14px; color:#44ff44; font-weight:bold; text-shadow: 0 0 5px #005500;">ur solo progress is saved!</p>
        <p style="font-size: 12px; color:#ddd; margin-top:5px;">After leaving the party the game automatically switches you to ur solo world with ur progress!</p>
    </div>
    
    <div style="display:flex; justify-content:space-between; gap:10px; margin-top:5px;">
        <button id="coopBtnCancel" style="flex:1; padding:12px; background:#aa2222; color:#fff; border:none; border-radius:8px; font-weight:bold; font-family:'Courier New',monospace; font-size:14px; cursor:pointer;">Cancel</button>
        <button id="coopBtnConfirm" style="flex:1.5; padding:12px; background:#22ccaa; color:#000; border:none; border-radius:8px; font-weight:bold; font-family:'Courier New',monospace; font-size:14px; cursor:pointer;">okay let's go!</button>
    </div>
</div>

<canvas id="gc"></canvas>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script src="data.js"></script>
<script src="render.js"></script>
<script src="multiplayer.js"></script>
<script src="game.js"></script>
</body>
</html>
